interface:
  display_name: "Nihaisha 中医课程"
  short_description: "把倪海厦中医课程整理成白话入口、课程模块、六经方证、针灸本草、逐课复习和板书证据索引。"
  default_prompt: "Use $nihaisha to 按倪海厦课程资料回答：默认只使用 references、仓库内截图和轻量 PDF 证据搜索，不自动安装、下载或调用 RAG。用户明确要求使用 RAG 且本地已有完整数据时，才切换到可选 RAG + 知识图谱模式；如果数据缺失，只说明完整资源约 3.68 GB、来自公开 Hugging Face Dataset、本地路径为 data/pdf_rag_bge_m3/，不得自动下载。只有用户另行明确要求下载 RAG 数据时才可下载，轻量检索不足不构成下载授权。先判断用户入口和课程模块，再做白话分水岭、六经/方证/穴位/药性梳理、逐课复习、截图证据检索和高风险安全提醒。只作课程学习与资料索引，不提供诊断、处方、剂量、煎服、针灸实操、停换药或自我治疗建议；涉及真实症状、附子/乌头/细辛/硫磺等毒烈药、攻下破血逐水方、肿瘤、孕产儿童老人、胸痛、呼吸困难、意识改变、严重腹痛/脱水/出血/中毒等情况时，提醒立即咨询合格医师或急诊。"

policy:
  allow_implicit_invocation: true
