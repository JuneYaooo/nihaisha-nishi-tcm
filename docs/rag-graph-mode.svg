<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="860" viewBox="0 0 1440 860" role="img" aria-labelledby="title desc">
  <title id="title">RAG 与知识图谱模式如何形成可追溯回答</title>
  <desc id="desc">用户问题从准确词语、语义理解、知识线索和图谱关系四个方向查找资料，经过合并与原文核验后，输出结论、原文摘录、文件页码和安全提醒。资料缺失或涉及急症时会单独提示。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8291a5"/>
    </marker>
    <style>
      .bg { fill: #0d1219; }
      .card { fill: #151d27; stroke: #314052; stroke-width: 1.5; }
      .primary { fill: #192433; stroke: #6683a4; stroke-width: 2; }
      .verify { fill: #20291f; stroke: #83a56b; stroke-width: 2; }
      .answer { fill: #2b2518; stroke: #c79b4b; stroke-width: 2; }
      .alert { fill: #281d21; stroke: #ba6d78; stroke-width: 1.5; }
      .line { fill: none; stroke: #8291a5; stroke-width: 2.2; marker-end: url(#arrow); }
      .line-soft { fill: none; stroke: #5d6c7e; stroke-width: 1.7; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .page-title { fill: #f4f7fb; font: 700 31px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .page-subtitle { fill: #9eacbd; font: 400 15px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .card-title { fill: #eef3f9; font: 700 19px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .copy { fill: #aebacc; font: 400 14px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .eyebrow { fill: #91a6bd; font: 600 12px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; letter-spacing: 1.2px; }
      .blue { fill: #7eb3e6; }
      .green { fill: #9fbe82; }
      .purple { fill: #c1a1dd; }
      .gold { fill: #e1b766; }
      .red { fill: #da8994; }
      .chip { fill: #233143; stroke: #40556d; stroke-width: 1; }
      .chip-text { fill: #bfd0e4; font: 600 12px Inter, "PingFang SC", "Microsoft YaHei", sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="860" rx="28"/>
  <text class="page-title" x="72" y="66">RAG + 知识图谱：让回答回到原文</text>
  <text class="page-subtitle" x="72" y="96">不同方式一起找资料，最终用 PDF 原文、文件名和页码说明答案从哪里来。</text>

  <rect class="primary" x="500" y="124" width="440" height="92" rx="18"/>
  <text class="eyebrow" x="530" y="153">第一步</text>
  <text class="card-title" x="530" y="183">理解用户想查什么</text>
  <text class="copy" x="530" y="205">识别问题重点，同时检查资料范围和安全风险</text>

  <path class="line-soft" d="M 940 170 L 1030 170"/>
  <rect class="alert" x="1030" y="124" width="330" height="92" rx="18"/>
  <text class="eyebrow red" x="1058" y="153">单独处理</text>
  <text class="card-title" x="1058" y="182">资料缺失或涉及急症</text>
  <text class="copy" x="1058" y="204">说明限制 · 转合适入口 · 安全提醒优先</text>

  <text class="eyebrow" x="72" y="272">第二步 · 从四个方向寻找资料</text>

  <rect class="card" x="72" y="294" width="284" height="166" rx="18"/>
  <circle cx="105" cy="330" r="10" class="blue"/>
  <text class="card-title" x="126" y="337">准确词语</text>
  <text class="copy" x="98" y="372">方名、穴位、原句和出处</text>
  <text class="copy" x="98" y="397">避免准确名称被相似内容替代</text>
  <rect class="chip" x="98" y="416" width="138" height="27" rx="14"/>
  <text class="chip-text" x="115" y="435">关键词检索</text>

  <rect class="card" x="392" y="294" width="284" height="166" rx="18"/>
  <circle cx="425" cy="330" r="10" class="green"/>
  <text class="card-title" x="446" y="337">语义理解</text>
  <text class="copy" x="418" y="372">理解白话问题和原文的相近意思</text>
  <text class="copy" x="418" y="397">FAISS 帮助快速查找大量语义资料</text>
  <rect class="chip" x="418" y="416" width="158" height="27" rx="14"/>
  <text class="chip-text" x="435" y="435">Embedding + FAISS</text>

  <rect class="card" x="712" y="294" width="284" height="166" rx="18"/>
  <circle cx="745" cy="330" r="10" class="purple"/>
  <text class="card-title" x="766" y="337">知识线索</text>
  <text class="copy" x="738" y="372">寻找方证、症状和比较关系</text>
  <text class="copy" x="738" y="397">帮助补充可能相关的课程段落</text>
  <rect class="chip" x="738" y="416" width="138" height="27" rx="14"/>
  <text class="chip-text" x="755" y="435">线索不是结论</text>

  <rect class="card" x="1032" y="294" width="328" height="166" rx="18"/>
  <circle cx="1065" cy="330" r="10" class="gold"/>
  <text class="card-title" x="1086" y="337">图谱导航</text>
  <text class="copy" x="1058" y="372">发现实体之间的关联和课程位置</text>
  <text class="copy" x="1058" y="397">关系线索仍要回到原文核验</text>
  <rect class="chip" x="1058" y="416" width="154" height="27" rx="14"/>
  <text class="chip-text" x="1075" y="435">图谱不是证据</text>

  <path class="line" d="M 590 216 C 420 242, 214 250, 214 294"/>
  <path class="line" d="M 660 216 C 610 246, 534 258, 534 294"/>
  <path class="line" d="M 780 216 C 820 246, 854 258, 854 294"/>
  <path class="line" d="M 850 216 C 1010 242, 1196 250, 1196 294"/>

  <path class="line" d="M 214 460 C 214 520, 500 522, 500 558"/>
  <path class="line" d="M 534 460 L 534 558"/>
  <path class="line" d="M 854 460 C 854 520, 700 522, 700 558"/>
  <path class="line" d="M 1196 460 C 1100 530, 890 540, 810 580"/>

  <rect class="primary" x="390" y="558" width="480" height="82" rx="18"/>
  <text class="eyebrow" x="420" y="588">第三步</text>
  <text class="card-title" x="420" y="616">合并结果，去掉跑题和重复内容</text>

  <path class="line" d="M 630 640 L 630 678"/>

  <rect class="verify" x="334" y="678" width="592" height="76" rx="18"/>
  <text class="eyebrow green" x="364" y="707">第四步</text>
  <text class="card-title" x="364" y="736">核对关键内容、资料来源和 PDF 原文</text>

  <path class="line" d="M 926 716 L 990 716"/>

  <rect class="answer" x="990" y="650" width="370" height="132" rx="18"/>
  <text class="eyebrow gold" x="1020" y="680">最终回答</text>
  <text class="card-title" x="1020" y="710">结论 + 原文依据</text>
  <text class="copy" x="1020" y="738">原文摘录 · 文件名 · 页码</text>
  <text class="copy" x="1020" y="762">证据不足说明 · 必要的安全提醒</text>

  <text class="page-subtitle" x="72" y="822">原则：有证据时展示证据；没有证据时如实说明；不拿其他课程的相似内容拼答案。</text>
</svg>
